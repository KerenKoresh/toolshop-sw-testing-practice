<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Product · ToolShop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
</head>
<body>
  <div class="shell">

    <header class="topbar">
      <div class="brand"><span class="logo"></span> ToolShop</div>
      <nav class="nav">
        <a href="/">Home</a>
        <a href="/#catalog">Catalog</a>
        <a href="/guide">Guide</a>
        <a href="/docs">API Docs</a>
      </nav>
      <a class="btn-dark" href="/docs">Public API</a>
    </header>

    <a class="back" href="/">&larr; Back to catalog</a>
    <div id="content"></div>

    <footer class="foot">
      <span>&copy; 2026 Keren Koresh — ToolShop</span>
      <span>writes via <a href="/docs">API</a></span>
    </footer>

  </div>

  <script>
    const productId = {{ product_id }};
    const content = document.getElementById('content');
    const EMOJI = { pliers:'🔧', cutters:'✂️', hammer:'🔨', saw:'🪚', wrench:'🔧',
                    drill:'🪛', screwdriver:'🪛', measures:'📏' };
    function emojiFor(cat){ return EMOJI[(cat||'').toLowerCase()] || '🛠️'; }
    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

    async function loadProduct() {
      try {
        const res = await fetch('/api/products/' + productId);
        const data = await res.json();
        if (!res.ok) {
          content.innerHTML = '<div class="msg error">' + escapeHtml(data.error || 'Product not found') + '</div>';
          document.title = 'Not found · ToolShop';
          return;
        }
        document.title = data.name + ' · ToolShop';
        content.innerHTML = `
          <div class="detail">
            <div class="hero-img">${emojiFor(data.category)}</div>
            <div>
              <div class="hero-tag">[ ${escapeHtml((data.category||'TOOL').toUpperCase())} ]</div>
              <h1>${escapeHtml(data.name)}</h1>
              <div class="price">$${Number(data.price).toFixed(2)}</div>
              <p class="lead">${escapeHtml(data.description || 'No description.')}</p>
              <dl>
                <dt>ID</dt><dd>${data.id}</dd>
                <dt>Category</dt><dd>${escapeHtml(data.category || 'Uncategorized')}</dd>
                <dt>Availability</dt>
                <dd><span class="pill ${data.in_stock ? 'in' : 'out'}">${data.in_stock ? 'In stock' : 'Out of stock'}</span></dd>
              </dl>
            </div>
          </div>`;
      } catch (e) {
        content.innerHTML = '<div class="msg error">Network error. Please try again.</div>';
      }
    }
    loadProduct();
  </script>
</body>
</html>
