databases:
  - name: toolshop-db
    plan: free          # free Postgres instance

services:
  - type: web
    name: toolshop
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Ensure the schema/seed once (before workers spawn), then serve.
    startCommand: python scripts/migrate.py && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DATABASE_URL          # injected from the Postgres instance above
        fromDatabase:
          name: toolshop-db
          property: connectionString

  # Daily cleanup: removes API-created products, keeps the baseline catalog.
  # Schedule is in UTC. "0 21 * * *" = 00:00 in Israel (IDT, UTC+3).
  - type: cron
    name: toolshop-cleanup
    runtime: python
    plan: free
    schedule: "0 21 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/cleanup.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DATABASE_URL
        fromDatabase:
          name: toolshop-db
          property: connectionString
